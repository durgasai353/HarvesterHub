<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Distribute Stock</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
}

.card{
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="card p-4 col-md-6 mx-auto">

<h3 class="text-center mb-4">Distribute Stock</h3>

<form action="distributionServlet" method="post">

<div class="mb-3">
<label>Item ID</label>
<input type="number" name="itemId" class="form-control" required>
</div>

<div class="mb-3">
<label>Farmer Name</label>
<input type="text" name="farmer" class="form-control" required>
</div>

<div class="mb-3">
<label>Quantity Taken</label>
<input type="number" name="qtyTaken" class="form-control" required>
</div>

<button class="btn btn-warning">Distribute</button>

</form>



</div>

</div>

</body>
</html>
